<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gallery</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script>(function(){var t=localStorage.getItem("theme");if(!t)t=window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark";document.documentElement.dataset.theme=t;}());</script>
</head>
<body>
    <header>
        <nav class="navbar">
            <ul>
                <li><a href="/" class="non-active">main page</a></li>
                <li><a href="/wiki" class="non-active">wiki</a></li>
                <li><a href="/gallery" class="active">gallery</a></li>
                <li class="dropdown">
                    <a href="/tools" class="non-active">tools</a>
                    <ul class="dropdown-menu">
                        <li><a href="/tools/wheel">wheel</a></li>
                        <li><a href="/tools/password">password</a></li>
                    </ul>
                </li>
                <li><a href="/contact" class="non-active">contact</a></li>
                <li id="theme-li"><span class="theme-lbl" id="lbl-dt">dt</span><button id="theme-btn" title="toggle theme"></button><span class="theme-lbl" id="lbl-lt">lt</span></li>
            </ul>
        </nav>
    </header>
    <main>
        <!-- To add images: copy a .gallery-item block and set the src to /images/yourfile.jpg -->
        <!-- To add a new category: copy a <section> block and change the <h2> heading -->
        <section>
            <h2>uncategorized</h2>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="/images/example.jpg" alt="example" onclick="openLightbox(this.src)">
                </div>
            </div>
        </section>
    </main>

    <div id="lightbox">
        <img id="lightbox-img" src="" alt="full size">
    </div>

    <footer id="visitor-footer">
        <span id="visitor-ip"></span>
        <span id="visitor-location"></span>
        <span id="visitor-org"></span>
    </footer>
    <script src="/js/gallery.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/nav-scroll.js"></script>
    <script src="/js/visitor-info.js"></script>
</body>
</html>
