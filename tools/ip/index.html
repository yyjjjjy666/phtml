<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ip — geller.ee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="manifest" href="/manifest.json">
    <script>(function(){var t=localStorage.getItem("theme");if(!t)t=window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark";document.documentElement.dataset.theme=t;}());</script>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="navbar-brand">geller.ee</a>
            <ul class="navbar-links">
                <li><a href="/" class="non-active">main page</a></li>
                <li><a href="/wiki" class="non-active">wiki</a></li>
                <li><a href="/gallery" class="non-active">gallery</a></li>
                <li class="dropdown">
                    <a href="/tools" class="active">tools</a>
                    <ul class="dropdown-menu">
                        <li><a href="/tools/wheel">wheel</a></li>
                        <li><a href="/tools/password">password</a></li>
                        <li><a href="/tools/ip">ip</a></li>
                    </ul>
                </li>
                <li><a href="/contact" class="non-active">contact</a></li>
            </ul>
            <div class="navbar-actions">
                <button id="palette-btn" title="command palette (Ctrl+K)">&#8984;</button>
                <span class="theme-lbl" id="lbl-dt">dt</span>
                <button id="theme-btn" title="toggle theme"></button>
                <span class="theme-lbl" id="lbl-lt">lt</span>
                <button id="nav-toggle" aria-label="menu">&#9776;</button>
            </div>
        </nav>
    </header>
    <main>
        <div class="tool-panel">
            <div class="tool-panel-header">ip lookup</div>
            <div id="ip-page">
                <h2>ip lookup</h2>
                <div id="ip-lookup-row">
                    <input id="ip-input" type="text" placeholder="enter ip address (blank = your ip)" autocomplete="off" spellcheck="false">
                    <button id="ip-lookup-btn">look up</button>
                </div>
                <div id="ip-status">loading...</div>
                <div id="ip-results"></div>
            </div>
        </div>
    </main>
    <script src="/js/ip-tool.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/nav-scroll.js"></script>
    <script src="/js/command-palette.js"></script>
    <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
