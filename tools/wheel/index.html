<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wheel</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script>(function(){var t=localStorage.getItem("theme");if(!t)t=window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark";document.documentElement.dataset.theme=t;}());</script>
</head>
<body>
    <header>
        <nav class="navbar">
            <ul>
                <li><a href="/" class="non-active">main page</a></li>
                <li><a href="/wiki" class="non-active">wiki</a></li>
                <li><a href="/gallery" class="non-active">gallery</a></li>
                <li class="dropdown">
                    <a href="/tools" class="active">tools</a>
                    <ul class="dropdown-menu">
                        <li><a href="/tools/wheel">wheel</a></li>
                        <li><a href="/tools/password">password</a></li>
                    </ul>
                </li>
                <li><a href="/contact" class="non-active">contact</a></li>
                <li id="theme-li"><span class="theme-lbl" id="lbl-dt">dt</span><button id="theme-btn" title="toggle theme"></button><span class="theme-lbl" id="lbl-lt">lt</span></li>
            </ul>
        </nav>
    </header>
    <main>
        <div id="wheel-page">
            <canvas id="wheel-canvas" width="400" height="400"></canvas>
            <div id="wheel-controls">
                <div id="item-input-row">
                    <input id="item-input" type="text" placeholder="add item..." maxlength="40">
                    <button id="add-btn">add</button>
                </div>
                <p id="wheel-msg"></p>
                <ul id="ul-items" id="item-list"></ul>
                <div id="spin-controls">
                    <label for="duration-input">spin duration (seconds)</label>
                    <input id="duration-input" type="number" min="1" max="60" value="5">
                    <button id="spin-btn">spin</button>
                </div>
                <p id="result"></p>
            </div>
        </div>
    </main>
    <footer id="visitor-footer">
        <span id="visitor-ip"></span>
        <span id="visitor-location"></span>
        <span id="visitor-org"></span>
    </footer>
    <script src="/js/wheel.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/visitor-info.js"></script>
</body>
</html>
