<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gallery</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <ul>
                <li><a href="index.html" class="non-active">main page</a></li>
                <li><a href="docs.html" class="non-active">docs</a></li>
                <li><a href="links.html" class="non-active">links</a></li>
                <li><a href="gallery.html" class="active">gallery</a></li>
                <li><a href="contact.html" class="non-active">contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <!-- To add images: copy a .gallery-item block and set the src to images/yourfile.jpg -->
        <!-- To add a new category: copy a <section> block and change the <h2> heading -->
        <section>
            <h2>uncategorized</h2>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="images/example.jpg" alt="example" onclick="openLightbox(this.src)">
                </div>
            </div>
        </section>
    </main>

    <div id="lightbox">
        <img id="lightbox-img" src="" alt="full size">
    </div>

    <footer id="visitor-footer">
        <span id="visitor-ip"></span>
        <span id="visitor-location"></span>
        <span id="visitor-org"></span>
    </footer>
    <script src="js/gallery.js"></script>
    <script src="js/visitor-info.js"></script>
</body>
</html>
